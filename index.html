<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Letter</title>

<style>

body{
  margin:0;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* rose */
#rose{
  width:150px;
  cursor:pointer;
}

/* slides */
.slide{
  position:absolute;
  max-width:80%;
  max-height:80%;
  opacity:0;
  transition:opacity 1.5s ease;
}

.show{
  opacity:1;
}

/* envelope png */
#envelope{
  width:120px;
  position:absolute;
  cursor:pointer;
  opacity:0;
  transition:opacity 1s ease;
}

/* final letter */
#letter{
  position:absolute;
  max-width:80%;
  max-height:80%;
  opacity:0;
  transition:opacity 1s ease;
}

</style>
</head>

<body>

<img id="rose" src="rose.png">

<img class="slide" id="img1" src="photo1.jpg">
<img class="slide" id="img2" src="photo2.jpg">
<img class="slide" id="img3" src="photo3.jpg">
<img class="slide" id="img4" src="photo4.jpg">

<img id="envelope" src="envelope.png">

<img id="letter" src="letter.png">

<audio id="music" src="song.mp3"></audio>

<script>

const rose = document.getElementById("rose");
const slides = [
  document.getElementById("img1"),
  document.getElementById("img2"),
  document.getElementById("img3"),
  document.getElementById("img4")
];

const envelope = document.getElementById("envelope");
const letter = document.getElementById("letter");
const music = document.getElementById("music");

let started = false;

rose.onclick = () => {

  if(started) return;
  started = true;

  rose.style.display = "none";
  music.play();

  let delay = 0;

  slides.forEach((slide, i) => {

    setTimeout(()=>{
      if(i>0) slides[i-1].classList.remove("show");
      slide.classList.add("show");
    }, delay);

    delay += 4000;

  });

  setTimeout(()=>{
    slides[3].classList.remove("show");
    envelope.style.opacity = 1;
  }, delay);

};

envelope.onclick = () => {

  envelope.style.display = "none";
  letter.style.opacity = 1;

};

</script>

</body>
</html>
